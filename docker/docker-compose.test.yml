version: '3.8'

services:
  postgres:
    build:
      context: ..
      dockerfile: docker/postgres/Dockerfile
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    profiles:
      - core
      - app
      - tools

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    profiles:
      - core
      - app

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 30s
    restart: on-failure:3
    networks:
      - app-network
  user-service:
    build:
      context: ../services/user-service
      dockerfile: Dockerfile
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: userdb
      DB_USER: user
      DB_PASSWORD: password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://admin:admin@rabbitmq
    ports:
      - "${USER_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    profiles:
      - app

  product-service:
    build:
      context: ../services/product-service
      dockerfile: Dockerfile
    environment:
      PORT: 3002
    ports:
      - "${PRODUCT_PORT:-3002}:3002"
    networks:
      - app-network
    restart: unless-stopped
    profiles:
      - app

  api-gateway:
    build:
      context: ../services/api-gateway
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      USER_SERVICE_URL: http://user-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    depends_on:
      - user-service
      - product-service
    networks:
      - app-network
    restart: unless-stopped
    profiles:
      - app

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    networks:
      - app-network
    profiles:
      - tools

  prometheus:
    build:
      context: ..
      dockerfile: docker/prometheus/Dockerfile
    ports:
      - "9090:9090"
    networks:
      - app-network
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  app-network:
    driver: bridge
